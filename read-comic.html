<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Read Comic - TSG Studios</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    /* BACKGROUND */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top right, rgba(0,191,255,0.15), transparent 25%),
      radial-gradient(circle at bottom left, rgba(0,191,255,0.08), transparent 25%);
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      backdrop-filter:blur(40px);
      z-index:-1;
    }

    /* NAVBAR */
    .navbar{
      position:sticky;
      top:0;
      width:100%;
      padding:18px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      z-index:999;
    }

    .logo{
      font-size:1.2rem;
      font-weight:bold;
      letter-spacing:1px;
    }

    .back-button{
      text-decoration:none;
      color:white;
      background:rgba(255,255,255,0.08);
      padding:10px 18px;
      border-radius:10px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .back-button:hover{
      background:#00bfff;
      transform:translateY(-2px);
    }

    /* MAIN */
    .main-container{
      width:100%;
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    /* HEADER */
    .hero{
      margin-bottom:30px;
    }

    .hero h1{
      font-size:clamp(2rem,5vw,3.5rem);
      margin-bottom:12px;
      line-height:1.1;
    }

    .hero p{
      color:#bdbdbd;
      max-width:700px;
      line-height:1.6;
      font-size:1rem;
    }

    /* CONTROL PANEL */
    .control-panel{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:25px;
      backdrop-filter:blur(12px);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      margin-bottom:30px;
    }

    .controls-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .field label{
      color:#d9d9d9;
      font-size:15px;
    }

    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#181818;
      color:white;
      font-size:15px;
      outline:none;
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
    }

    select:focus{
      border-color:#00bfff;
      box-shadow:0 0 15px rgba(0,191,255,0.2);
    }

    option{
      background:#111;
    }

    /* BUTTON */
    .button-wrapper{
      margin-top:25px;
      display:flex;
      justify-content:flex-start;
    }

    .start-button{
      border:none;
      background:linear-gradient(135deg,#00bfff,#0077ff);
      color:white;
      padding:14px 24px;
      border-radius:14px;
      font-size:16px;
      cursor:pointer;
      transition:0.35s;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 10px 25px rgba(0,191,255,0.25);
    }

    .start-button:hover{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 18px 35px rgba(0,191,255,0.35);
    }

    .start-button:disabled{
      opacity:0.5;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    /* READER */
    .reader-container{
      width:100%;
      background:#111;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 15px 40px rgba(0,0,0,0.5);
      display:none;
      animation:fadeUp 0.6s ease;
    }

    iframe{
      width:100%;
      height:85vh;
      border:none;
      background:#111;
    }

    /* AUDIO */
    .audio-controls{
      margin-top:25px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:18px;
      display:none;
      animation:fadeUp 0.6s ease;
    }

    .audio-header{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:15px;
      color:#00bfff;
    }

    audio{
      width:100%;
    }

    /* ANIMATION */
    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* MOBILE */
    @media(max-width:768px){

      .controls-grid{
        grid-template-columns:1fr;
      }

      .navbar{
        padding:15px 20px;
      }

      .hero h1{
        font-size:2.2rem;
      }

      iframe{
        height:70vh;
      }

      .start-button{
        width:100%;
        justify-content:center;
      }
    }
  </style>
</head>
<meta name="description" content="TSG Studios - Watch movies, read comics, and explore cinematic storytelling.">

<meta name="keywords" content="TSG Studios, movies, comics, entertainment, cinematic storytelling, streaming, studio">

<meta name="author" content="TSG Studios">

<meta name="robots" content="index, follow">

<meta property="og:title" content="TSG Studios">
<meta property="og:description" content="Movies, comics, and cinematic storytelling.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tsg-studios.github.io/tsgstudios/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="TSG Studios">
<meta name="twitter:description" content="Movies, comics, and cinematic storytelling.">
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">TSG Studios</div>

    <a href="comics.html" class="back-button">
      <i class="fas fa-arrow-left"></i>
      Back to Library
    </a>
  </div>

  <!-- MAIN -->
  <div class="main-container">

    <!-- HERO -->
    <div class="hero">
      <h1>Read Your Comic</h1>
      <p>
        Experience cinematic storytelling with immersive narration,
        smooth reading, and the world of TSG Studios.
      </p>
    </div>

    <!-- CONTROLS -->
    <div class="control-panel">

      <div class="controls-grid">

        <!-- PDF -->
        <div class="field">
          <label for="pdf-select">
            <i class="fas fa-book-open"></i>
            Choose Comic
          </label>

          <select id="pdf-select">
            <option value="">-- Select PDF --</option>
            <option value="Fury of the Gods vol1.pdf">
              Fury of the Gods Vol 1
            </option>

            <option value="Fury of the Gods vol2.pdf">
              Fury of the Gods Vol 2
            </option>

            <option value="Fury of the Gods vol3.pdf">
              Fury of the Gods Vol 3
            </option>
          </select>
        </div>

        <!-- AUDIO -->
        <div class="field">
          <label for="audio-select">
            <i class="fas fa-headphones"></i>
            Choose Narration
          </label>

          <select id="audio-select">
            <option value="">-- Select Audio --</option>

            <option value="FURY OF THE GODS vol1 audiobook.mp3">
              Fury of the Gods Vol 1 Audiobook
            </option>

            <option value="audiobook.mp3">
              Audiobook 2
            </option>

            <option value="audiobook.mp3">
              Audiobook 3
            </option>
          </select>
        </div>

      </div>

      <!-- BUTTON -->
      <div class="button-wrapper">
        <button id="start-button" class="start-button" disabled>
          <i class="fas fa-play"></i>
          Start Reading
        </button>
      </div>

    </div>

    <!-- READER -->
    <div class="reader-container" id="reader-container">
      <iframe id="comic-viewer" title="Comic Reader"></iframe>
    </div>

    <!-- AUDIO -->
    <div class="audio-controls" id="audio-controls">

      <div class="audio-header">
        <i class="fas fa-volume-up"></i>
        <span>Now Playing Narration</span>
      </div>

      <audio id="audio-player" controls>
        <source id="audio-source" src="" type="audio/mp3"/>
        Your browser does not support audio.
      </audio>

    </div>

  </div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

/* ================= ELEMENTS ================= */
const pdfSelect =
document.getElementById("pdf-select");

const audioSelect =
document.getElementById("audio-select");

const startButton =
document.getElementById("start-button");

const iframe =
document.getElementById("comic-viewer");

const readerContainer =
document.getElementById("reader-container");

const audioPlayer =
document.getElementById("audio-player");

const audioSource =
document.getElementById("audio-source");

const audioControls =
document.getElementById("audio-controls");

/* ================= ENABLE BUTTON ================= */
function checkSelections(){

  startButton.disabled =
  !(pdfSelect.value && audioSelect.value);

}

pdfSelect.addEventListener(
  "change",
  checkSelections
);

audioSelect.addEventListener(
  "change",
  checkSelections
);

/* ================= START READING ================= */
startButton.addEventListener("click", () => {

  const pdf =
  pdfSelect.value;

  const audio =
  audioSelect.value;

  /* LOAD PDF */
  iframe.src =
  `assets/Books/${encodeURIComponent(pdf)}`;

  readerContainer.style.display =
  "block";

  /* LOAD AUDIO */
  audioSource.src =
  `assets/Audio/${encodeURIComponent(audio)}`;

  audioPlayer.load();

  audioControls.style.display =
  "block";

  /* SCROLL TO READER */
  readerContainer.scrollIntoView({

    behavior:"smooth"

  });

  /* TRY AUTOPLAY */
  audioPlayer.play()

  .catch(err => {

    console.warn(
      "Autoplay blocked:",
      err
    );

  });

});

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {

  apiKey: "YOUR_API_KEY",

  authDomain:
  "YOUR_PROJECT.firebaseapp.com",

  projectId:
  "YOUR_PROJECT_ID",

  storageBucket:
  "YOUR_PROJECT.appspot.com",

  messagingSenderId:
  "XXXX",

  appId:
  "XXXX"

};

/* ================= INITIALIZE FIREBASE ================= */
firebase.initializeApp(firebaseConfig);

const auth =
firebase.auth();


/* ================= LOGOUT ================= */
const logoutBtn =
document.getElementById("logout-btn");

if(logoutBtn){

  logoutBtn.addEventListener("click", () => {

    auth.signOut()

    .then(() => {

      window.location.href =
      "index.html";

    })

    .catch((error) => {

      alert(error.message);

    });

  });

}

</script>

</body>
</html>
